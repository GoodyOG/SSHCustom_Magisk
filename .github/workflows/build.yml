name: Build SSHCustom

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"
          cache: true

      - name: Build flashable module
        run: ./build.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SSHCustom-Magisk-v1.0.0
          path: |
            dist/SSHCustom-Magisk-v1.0.0.zip
            src/module/bin/arm64/sshcustomd
            src/module/bin/arm/sshcustomd

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SSHCustom-Magisk-v1.0.0.zip
          generate_release_notes: true
