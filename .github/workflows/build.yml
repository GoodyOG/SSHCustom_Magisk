name: Build SSHCustom

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  module-and-daemon:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"
          cache: true

      - name: Read VERSION
        id: ver
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Build flashable module
        run: ./build.sh

      - name: Upload module artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SSHCustom-Magisk-v${{ steps.ver.outputs.version }}
          path: |
            dist/SSHCustom-Magisk-v${{ steps.ver.outputs.version }}.zip
            src/module/bin/arm64/sshcustomd
            src/module/bin/arm/sshcustomd

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [module-and-daemon]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Read VERSION
        id: ver
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Download module ZIP
        uses: actions/download-artifact@v4
        with:
          name: SSHCustom-Magisk-v${{ steps.ver.outputs.version }}
          path: out/module

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/module/dist/SSHCustom-Magisk-v${{ steps.ver.outputs.version }}.zip
          generate_release_notes: true
